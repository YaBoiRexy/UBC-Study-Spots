<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBC Study Spots</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="map"></div>
    <div id="sidebar">
        <h1 id="sidebar-title">UBC Study Spots</h1>
        <div id="sidebar-content">
            <p id="status">Loading study spots...</p>
            <ul id="spots-list">
                <!-- Study spots will be loaded here by JavaScript -->
            </ul>
        </div>
        <div id="spot-detail">
            <h2 id="detail-name">Spot Name</h2>
            <div id="detail-metrics">
                <p><span class="detail-label">Status:</span> <span id="detail-status">Really Good</span></p>
                <p><span class="detail-label">Busy-ness:</span> <span id="detail-busy">Usually isolated</span></p>
            </div>
            <p><span id="detail-distance">0 km away</span></p>

            <p id="detail-description"></p>

            <div class="detail-section">
                <h3>Features</h3>
                <div id="detail-features" class="feature-container"></div>
            </div>

            <div class="detail-section">
                <h3>Bonuses</h3>
                <div id="detail-bonuses" class="feature-container"></div>
            </div>

            <div class="detail-section">
                <h3>Notes</h3>
                <p id="detail-notes"></p>
            </div>

            <button id="back-to-list">Back to List</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
