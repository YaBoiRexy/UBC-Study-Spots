<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBC Study Spots</title>
    <!-- Use standard Leaflet CDN without integrity hashes for better compatibility during development -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="map"></div>
    <div id="sidebar">
        <h1 id="sidebar-title">UBC Study Spots</h1>
        <div id="sidebar-content">
            <p id="status">Loading study spots...</p>
            <ul id="spots-list">
                <!-- Study spots will be loaded here by JavaScript -->
            </ul>
        </div>
        <div id="spot-detail">
            <h2 id="detail-name">Spot Name</h2>
            <p><span class="detail-label">Distance:</span> <span id="detail-distance">0 km away</span></p>
            <p id="detail-description">Description of the spot goes here.</p>
            <p><span class="detail-label">Capacity:</span> <span id="detail-capacity">Moderate</span></p>
            <p><span class="detail-label">Features:</span> <span id="detail-features">Wi-Fi, Power Outlets</span></p>
            <button id="back-to-list">Back to List</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
